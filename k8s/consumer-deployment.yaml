apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-sqs-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-sqs-consumer
  template:
    metadata:
      labels:
        app: ml-sqs-consumer
    spec:
      containers:
      - name: consumer
        image: <YOUR_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/sqs-consumer:latest
        imagePullPolicy: Always
        env:
        - name: QUEUE_URL
          value: "https://sqs.us-east-1.amazonaws.com/<YOUR_ACCOUNT_ID>/<YOUR_QUEUE_NAME>"
        - name: MODEL_KEY
          value: "models/<YOUR_MODEL_TIMESTAMP_PATH>/model.pkl"